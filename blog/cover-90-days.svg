<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="90-дневный roadmap внедрения ИИ">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101018"/>
      <stop offset="1" stop-color="#191927"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6c5ce0"/>
      <stop offset="1" stop-color="#b9a4ff"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.72" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#6c5ce0" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6c5ce0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <rect width="800" height="450" fill="url(#glow2)"/>

  <!-- rising metric line in background -->
  <path d="M60 380 C200 370, 300 330, 420 280 S 660 160, 740 110"
        fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="42" stroke-linecap="round"/>
  <path d="M60 380 C200 370, 300 330, 420 280 S 660 160, 740 110"
        fill="none" stroke="url(#track)" stroke-width="3" stroke-linecap="round"/>

  <!-- milestones 30 / 60 / 90 -->
  <g font-family="'Inter Tight', sans-serif" text-anchor="middle">
    <g>
      <circle cx="180" cy="362" r="26" fill="#16161f" stroke="#6c5ce0" stroke-width="2"/>
      <text x="180" y="369" font-size="18" font-weight="600" fill="#e8e8f2">30</text>
      <text x="180" y="412" font-size="13" fill="#9a9ab5" font-family="'Victor Mono', monospace">процессы</text>
    </g>
    <g>
      <circle cx="430" cy="276" r="26" fill="#16161f" stroke="#8f7bf0" stroke-width="2"/>
      <text x="430" y="283" font-size="18" font-weight="600" fill="#e8e8f2">60</text>
      <text x="430" y="326" font-size="13" fill="#9a9ab5" font-family="'Victor Mono', monospace">обучение</text>
    </g>
    <g>
      <circle cx="680" cy="152" r="30" fill="#6c5ce0"/>
      <circle cx="680" cy="152" r="38" fill="none" stroke="#b9a4ff" stroke-opacity="0.5" stroke-width="1.5"/>
      <text x="680" y="159" font-size="19" font-weight="700" fill="#ffffff">90</text>
      <text x="680" y="212" font-size="13" fill="#b9a4ff" font-family="'Victor Mono', monospace">результат</text>
    </g>
  </g>

  <!-- header chip -->
  <g font-family="'Victor Mono', ui-monospace, monospace">
    <rect x="56" y="56" width="196" height="40" rx="20" fill="#16161f" stroke="#2e2e46"/>
    <circle cx="80" cy="76" r="5" fill="#6c5ce0"/>
    <text x="96" y="81" font-size="14" fill="#e8e8f2">AI roadmap · C-level</text>
  </g>

  <!-- KPI card -->
  <g font-family="'Inter Tight', sans-serif">
    <rect x="56" y="130" width="170" height="86" rx="12" fill="#16161f" stroke="#2e2e46"/>
    <text x="76" y="162" font-size="13" fill="#9a9ab5" font-family="'Victor Mono', monospace">эффект без</text>
    <text x="76" y="182" font-size="13" fill="#9a9ab5" font-family="'Victor Mono', monospace">«пилотов ради</text>
    <text x="76" y="202" font-size="13" fill="#9a9ab5" font-family="'Victor Mono', monospace">пилотов»</text>
  </g>
</svg>
